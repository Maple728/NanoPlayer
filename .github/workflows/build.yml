name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install libmpv
        run: brew install mpv pkg-config

      - name: Build NanoPlayer.app
        run: ./build-app.sh

      - name: Verify app bundle
        run: |
          test -d NanoPlayer.app/Contents/MacOS
          test -f NanoPlayer.app/Contents/MacOS/NanoPlayer
